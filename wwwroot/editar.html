<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Artículo</title>
<link rel="stylesheet" href="css/estilos.css">
<script defer src="js/form.js"></script>
</head>
<body>
<h1>Editar Artículo</h1>
<form id="form-articulo">
    <input type="hidden" id="id">
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" required>

    <label for="stock">Stock:</label>
    <input type="number" id="stock" required>

    <label for="imagen">Imagen (nombre archivo en Imagenes/):</label>
    <input type="text" id="imagen" required>

    <img id="preview">

    <div class="acciones">
        <button type="submit" class="btn editar">Actualizar</button>
        <button type="button" class="btn borrar" onclick="window.location.href='index.html'">Cancelar</button>
    </div>
</form>
<div id="mensaje"></div>
</body>
</html>
